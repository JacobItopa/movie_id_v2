services:
  # Backend Service (FastAPI)
  - type: web
    name: movie-id-backend
    env: python
    rootDir: backend
    buildCommand: "pip install --upgrade pip && (pip install -r requirements.txt || pip install -r backend/requirements.txt)"
    startCommand: "cd backend && gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ZENROWS_API_KEY
        sync: false

  # Frontend Service (Next.js)
  - type: web
    name: movie-id-frontend
    env: node
    rootDir: frontend
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm start"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: movie-id-backend
          envVarKey: RENDER_EXTERNAL_URL
